<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplayer Tic-Tac-Toe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">

    <div id="app" class="max-w-md mx-auto p-6">
        <!-- Loading State -->
        <div id="loading" class="flex flex-col items-center justify-center h-screen">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600"></div>
            <p class="mt-4 text-slate-500 font-medium">Initializing Server...</p>
        </div>

        <!-- Lobby View -->
        <div id="lobby" class="hidden mt-20 bg-white p-8 rounded-3xl shadow-xl border border-slate-100">
            <div class="flex justify-center mb-6">
                <div class="bg-indigo-50 p-4 rounded-2xl text-indigo-600">
                    <i data-lucide="trophy" class="w-12 h-12"></i>
                </div>
            </div>
            <h1 class="text-3xl font-black text-center mb-2 italic">TIC-TAC-TOE</h1>
            <p class="text-slate-500 text-center mb-10">Online Multiplayer Battle</p>

            <button onclick="createGame()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl shadow-lg transition-all flex items-center justify-center gap-3 mb-6">
                <i data-lucide="plus" class="w-6 h-6"></i> Create Private Room
            </button>

            <div class="relative flex items-center mb-6">
                <div class="flex-grow border-t border-slate-200"></div>
                <span class="mx-4 text-slate-400 text-xs font-bold uppercase tracking-widest">or join</span>
                <div class="flex-grow border-t border-slate-200"></div>
            </div>

            <input id="roomInput" type="text" placeholder="ROOM CODE" class="w-full px-4 py-4 border-2 border-slate-100 rounded-2xl mb-4 text-center text-xl font-mono tracking-[0.3em] uppercase focus:border-indigo-500 outline-none">
            <button onclick="joinGame()" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-4 rounded-2xl transition-all flex items-center justify-center gap-3">
                <i data-lucide="log-in" class="w-5 h-5"></i> Join Battle
            </button>
            <p id="errorMsg" class="mt-4 text-rose-500 text-center text-sm hidden bg-rose-50 p-2 rounded-lg"></p>
        </div>

        <!-- Game View -->
        <div id="game" class="hidden py-10">
            <div class="flex justify-between items-center mb-8">
                <button onclick="exitGame()" class="p-2 text-slate-400 hover:text-rose-500"><i data-lucide="log-out" class="w-6 h-6"></i></button>
                <div class="flex items-center gap-2 bg-white px-4 py-2 rounded-2xl shadow-sm border border-slate-100">
                    <span class="text-xs font-bold text-slate-400 uppercase">Room</span>
                    <span id="displayRoomCode" class="font-mono font-bold text-indigo-600 text-lg">---</span>
                </div>
            </div>

            <div id="playersInfo" class="grid grid-cols-2 gap-4 mb-8 text-center">
                 <div class="p-4 bg-white rounded-2xl border-2 border-slate-100" id="playerXCard">
                    <i data-lucide="x" class="w-6 h-6 mx-auto mb-1 text-indigo-600"></i>
                    <p class="text-[10px] font-bold text-slate-400 uppercase">Player X</p>
                 </div>
                 <div class="p-4 bg-white rounded-2xl border-2 border-slate-100" id="playerOCard">
                    <i data-lucide="circle" class="w-5 h-5 mx-auto mb-1 text-rose-500"></i>
                    <p class="text-[10px] font-bold text-slate-400 uppercase">Player O</p>
                 </div>
            </div>

            <div class="text-center mb-8">
                <h2 id="statusText" class="text-2xl font-black text-slate-800 uppercase">Waiting...</h2>
            </div>

            <div id="board" class="grid grid-cols-3 gap-3 bg-slate-200 p-3 rounded-[2rem] aspect-square shadow-inner mb-10">
                <!-- Tiles generated by JS -->
            </div>

            <div class="flex justify-center">
                <button onclick="resetGame()" class="bg-indigo-600 text-white font-bold py-4 px-8 rounded-2xl shadow-lg flex items-center gap-2 transition-all active:scale-95">
                    <i data-lucide="refresh-cw" class="w-5 h-5"></i> Reset Match
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'shared-ttt-game';

        let currentUser = null;
        let gameId = null;
        let gameState = null;
        let unsubscribe = null;

        signInAnonymously(auth).then(res => {
            currentUser = res.user;
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('lobby').classList.remove('hidden');
            lucide.createIcons();
        });

        window.createGame = async () => {
            const id = Math.random().toString(36).substring(2, 7).toUpperCase();
            const gameRef = doc(db, 'artifacts', appId, 'public', 'data', 'games', id);
            await setDoc(gameRef, {
                board: Array(9).fill(null),
                playerX: currentUser.uid,
                playerO: null,
                turn: 'X',
                winner: null,
                status: 'waiting'
            });
            startListening(id);
        };

        window.joinGame = async () => {
            const input = document.getElementById('roomInput').value.toUpperCase().trim();
            if(!input) return;
            const gameRef = doc(db, 'artifacts', appId, 'public', 'data', 'games', input);
            const snap = await getDoc(gameRef);
            if(snap.exists()) {
                const data = snap.data();
                if(!data.playerO && data.playerX !== currentUser.uid) {
                    await updateDoc(gameRef, { playerO: currentUser.uid, status: 'playing' });
                }
                startListening(input);
            } else {
                showError("Invalid Code");
            }
        };

        function startListening(id) {
            gameId = id;
            if(unsubscribe) unsubscribe();
            unsubscribe = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'games', id), (snap) => {
                if(snap.exists()) {
                    gameState = snap.data();
                    updateUI();
                }
            });
            document.getElementById('lobby').classList.add('hidden');
            document.getElementById('game').classList.remove('hidden');
            document.getElementById('displayRoomCode').innerText = id;
        }

        function updateUI() {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';
            gameState.board.forEach((cell, i) => {
                const btn = document.createElement('button');
                btn.className = `bg-white rounded-[1.2rem] flex items-center justify-center text-4xl shadow-sm`;
                if (cell === 'X') btn.innerHTML = '<i data-lucide="x" class="w-12 h-12 text-indigo-600"></i>';
                else if (cell === 'O') btn.innerHTML = '<i data-lucide="circle" class="w-10 h-10 text-rose-500"></i>';
                btn.onclick = () => makeMove(i);
                boardEl.appendChild(btn);
            });

            const statusText = document.getElementById('statusText');
            if (gameState.status === 'waiting') statusText.innerText = "Waiting for Opponent...";
            else if (gameState.winner) statusText.innerText = gameState.winner === 'draw' ? "It's a Draw!" : `Player ${gameState.winner} Wins!`;
            else {
                const myRole = currentUser.uid === gameState.playerX ? 'X' : 'O';
                statusText.innerText = (gameState.turn === myRole) ? "Your Turn" : "Opponent's Turn";
            }

            document.getElementById('playerXCard').style.borderColor = gameState.turn === 'X' ? '#4f46e5' : 'transparent';
            document.getElementById('playerOCard').style.borderColor = gameState.turn === 'O' ? '#f43f5e' : 'transparent';
            lucide.createIcons();
        }

        window.makeMove = async (i) => {
            const myRole = currentUser.uid === gameState.playerX ? 'X' : (currentUser.uid === gameState.playerO ? 'O' : null);
            if (!myRole || gameState.turn !== myRole || gameState.board[i] || gameState.winner || gameState.status === 'waiting') return;
            const newBoard = [...gameState.board];
            newBoard[i] = myRole;
            const win = checkWinner(newBoard);
            const draw = !win && newBoard.every(c => c !== null);
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'games', gameId), {
                board: newBoard,
                turn: myRole === 'X' ? 'O' : 'X',
                winner: win || (draw ? 'draw' : null),
                status: (win || draw) ? 'finished' : 'playing'
            });
        };

        function checkWinner(b) {
            const lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            for(let l of lines) if(b[l[0]] && b[l[0]] === b[l[1]] && b[l[0]] === b[l[2]]) return b[l[0]];
            return null;
        }

        window.resetGame = async () => {
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'games', gameId), {
                board: Array(9).fill(null), turn: 'X', winner: null, status: gameState.playerO ? 'playing' : 'waiting'
            });
        };

        window.exitGame = () => { if(unsubscribe) unsubscribe(); document.getElementById('game').classList.add('hidden'); document.getElementById('lobby').classList.remove('hidden'); };
        function showError(m) { const e = document.getElementById('errorMsg'); e.innerText = m; e.classList.remove('hidden'); setTimeout(() => e.classList.add('hidden'), 2000); }
    </script>
</body>
</html>
